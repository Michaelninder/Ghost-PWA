<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Apps Directory</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; margin: 20px auto; max-width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        a { text-decoration: none; color: white; display: block; padding: 10px; border-radius: 5px; font-weight: bold; }
        .btn-tiktok { background: #000; }
        .btn-facebook { background: #1877F2; }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    </style>
</head>
<body>
    <h1>Ghost Apps Directory</h1>
    <p>Select an app below to view the simulator.</p>

    <div class="card">
        <h2>TikTok</h2>
        <a href="tiktok/" class="btn-tiktok">Open TikTok Simulator</a>
    </div>

    <div class="card">
        <h2>Facebook</h2>
        <a href="facebook/" class="btn-facebook">Open Facebook Simulator</a>
    </div>

    <div class="card">
        <h2>Instagram</h2>
        <a href="instagram/" class="btn-instagram">Open Instagram Simulator</a>
    </div>
</body>
</html>
