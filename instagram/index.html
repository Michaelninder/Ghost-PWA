<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-logo.png">
    <link rel="apple-touch-icon" href="icon-logo.png">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        body { margin: 0; padding: 0; background-color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #262626; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(0, 0, 0, 0.1); border-left-color: #E1306C; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-container { display: none; padding: 20px; }
        h1 { font-size: 1.2rem; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 0.9rem; color: #8e8e8e; }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="error" class="error-container">
        <h1>Couldn't Refresh Feed</h1>
        <p>Instagram is having trouble connecting right now. Please check your internet connection and try again.</p>
        <p style="font-size: 0.7rem; margin-top: 20px; color: #c7c7c7;">Error Code: 503-IG-TIMEOUT</p>
    </div>
    <script>
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }, 3000);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js', { scope: './' });
        }
    </script>
</body>
</html>
